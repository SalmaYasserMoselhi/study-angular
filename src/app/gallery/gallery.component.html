<section class="p-4 border rounded bg-light">
  <h2>Gallery — Lifecycle Hooks &amp; Services Demo</h2>

  <!-- 
    Service Usage Demo
    - users[] is loaded from UserDataService in ngOnInit.
    - Adding/removing delegates back to the service, keeping the component stateless.
    - Open the browser console to watch lifecycle hooks fire (1→2→3)
      and then fire ngOnDestroy (4) when you navigate away.
  -->
  <div class="mb-4">
    <h5>Users <span class="badge bg-secondary">from UserDataService</span></h5>
    <ul class="list-group mb-3">
      @for (user of users; track user) {
        <li
          class="list-group-item d-flex justify-content-between align-items-center"
        >
          {{ user }}
          <button
            class="btn btn-sm btn-outline-danger"
            (click)="removeUser(user)"
          >
            Remove
          </button>
        </li>
      } @empty {
        <li class="list-group-item text-muted">No users yet.</li>
      }
    </ul>

    <div class="input-group" style="max-width: 300px">
      <input
        #nameInput
        type="text"
        class="form-control"
        placeholder="New user name"
      />
      <button
        class="btn btn-primary"
        (click)="addUser(nameInput.value); nameInput.value = ''"
      >
        Add
      </button>
    </div>
  </div>

  <p class="text-muted small">
    Open DevTools console and navigate to/away from this page to see lifecycle
    hook logs.
  </p>
</section>
