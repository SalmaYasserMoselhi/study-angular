<!-- All values used here (product.title, product.price, etc.) come from @Input() product -->
<div class="card h-100 shadow-sm">
  <img
    [src]="product.imageCover"
    class="card-img-top"
    [alt]="product.title"
    loading="lazy"
  />
  <div class="card-body d-flex flex-column">
    <h5 class="card-title h6">{{ product.title }}</h5>
    <p class="card-text small text-muted">
      {{ product.description }}
    </p>
    <div class="mt-auto d-flex justify-content-between align-items-center">
      <span class="fw-bold text-primary">{{ product.price }} EGP</span>
      <button class="btn btn-sm btn-outline-primary shadow-none">View</button>
    </div>

    <!-- ARCHIVED: Nested @for loop — iterates product.images to show thumbnails -->

      @for (productImageSrc of product.images; track $index) {
        <div class="col">
          <img [src]="productImageSrc" class="w-100 rounded" alt="" />
        </div>
      }
    </div> -->
  </div>
</div>
