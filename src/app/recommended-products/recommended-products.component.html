<div class="row g-4">
  @for (product of recommendedProducts; track product.id) {
    <div class="col-md-4 col-lg-3">
      <div class="card h-100 shadow-sm">
        <img
          [src]="product.imageCover"
          class="card-img-top"
          [alt]="product.title"
          loading="lazy"
        />
        <div class="card-body d-flex flex-column">
          <h5 class="card-title h6">{{ product.title }}</h5>
          <p class="card-text small text-muted">
            {{ product.description }}
          </p>
          <div
            class="mt-auto d-flex justify-content-between align-items-center"
          >
            <span class="fw-bold text-primary">{{ product.price }} EGP</span>
            <button class="btn btn-sm btn-outline-primary shadow-none">
              View
            </button>
          </div>
          <!-- <div class="row g-1 mt-2"> -->
          <!-- Nested Loop: Each image in its own column for a single line layout -->
          <!-- @for (productImageSrc of product.images; track $index) {
                  <div class="col">
                    <img [src]="productImageSrc" class="w-100 rounded" alt="" />
                  </div>
                } -->
          <!-- </div> -->
        </div>
      </div>
    </div>
  } @empty {
    <div class="col-12 text-center py-4">
      <p class="text-muted mb-0">No recommendations available at the moment.</p>
    </div>
  }
</div>
