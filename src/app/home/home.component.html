  <!-- 
    7. FOR LOOP @for
    - Renders a list of items dynamically.
    - Options: $index, $count, $first, $last, $even, $odd.
    - Performance: Always 'track' by a unique ID; use $index only as a last resort.
    - @empty: Shows content when the list is empty.
    -->
  <!-- <div class="mb-5 p-3 border rounded bg-light">
    <h3>7. For Loop (Simple List)</h3>

      }

  <div class="mb-5 p-3 border rounded bg-light">
    <h3>Products List</h3>
    <div class="row g-4">
      @for (product of productsList; track product.id) {
        <div class="col-md-4 col-lg-3">
          <app-product-card [product]="product"></app-product-card>
        </div>
      } @empty {
        <p class="text-center text-muted fs-5">No Products Available</p>
      }
    </div>
  </div>

  <div class="mb-5 p-3 border rounded bg-light">
    <h3 #deferTrigger>Recommended Products</h3>

    <!-- 
      @defer (Deferrable Views)
      - Lazy-loads components to improve performance.
      - Triggers: on idle, immediate, viewport, hover, interaction, timer, when <condition>.
      - Blocks: @placeholder, @loading, @error.
      - 'prefetch': Loads JS in advance (e.g., prefetch on idle).
    -->
    <!-- EXAMPLE 1: Trigger on a specific element (#deferTrigger) -->
    <!-- 
    @defer (on interaction(deferTrigger)) {
      <app-recommended-products />
    } 
    -->

    <!-- EXAMPLE 2: Trigger on self (placeholder) -->
    <!-- 
    @defer (on hover) {
      <app-recommended-products />
    } @placeholder {
      <div class="p-3 border text-center">Hover here to load recommended products</div>
    } 
    -->

    <!-- EXAMPLE 3: prefetch -->
    @defer (on interaction; prefetch on idle) {
      <app-recommended-products></app-recommended-products>
    } @placeholder {
      <button class="btn btn-primary d-block mx-auto">
        show recommended products
      </button>
    }

    <!-- ACTIVE IMPLEMENTATION -->
    <!-- @defer (on viewport(deferTrigger)) {
      <app-recommended-products></app-recommended-products>
    } -->
  </div>

  <!-- NOTE: 'on immediate' loads right away but still lazy-loads the JS bundle -->
  <!-- @defer (on immediate) {
