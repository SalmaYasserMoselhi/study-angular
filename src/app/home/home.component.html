  <!-- 
    2. PROPERTY BINDING [property]
    - Binds a TypeScript value to an HTML element property (not attribute).
    - Keeps data types (e.g. [disabled]="true" passes a boolean, not the string "true").
    - Syntax: [propertyName]="expression"
  -->
  <!-- <div class="mb-5 p-3 border rounded bg-light">

    <br />
    <button [disabled]="isBtnDisabled" class="btn btn-secondary">Disabled Button</button>
  </div> -->

  <!-- 
    3. EVENT BINDING (event)
    - Listens for browser events and calls a TS method.
    - $event gives access to the native DOM event object.
    - Syntax: (eventName)="handlerMethod($event)"
  -->
  <!-- <div class="mb-5 p-3 border rounded bg-light">

      <input type="text" class="form-control" (keydown)="onKeydown($event)" placeholder="Type something..."/>
    </div>
  </div> -->

  <!-- 
    4. ATTRIBUTE BINDING [attr.attribute]
    - Used when no equivalent DOM property exists.
    - Common use cases: colspan, aria-*, role (Accessibility & SEO).
    - Syntax: [attr.attributeName]="expression"
  -->
  <!-- <div class="mb-5 p-3 border rounded bg-light">

  </div> -->

    - Adds/removes CSS classes based on a condition.
    - Object syntax: [class]="{ 'class-name': condition }"

  -->

  <!-- 
    7. CONTROL FLOW: @for
    - Renders a list of items dynamically (replaces *ngFor in modern Angular).
    - Variables available: $index, $count, $first, $last, $even, $odd.
    - 'track': Required — tells Angular how to identify each item for efficient re-rendering.
      Always track by a unique field (e.g. product.id). Use $index only as a last resort.
    - @empty: Rendered when the list is empty.
  -->
  <!-- <div class="mb-5 p-3 border rounded bg-light">

      }
    </ul>
  </div> -->

  <!-- ===== ACTIVE DEMOS ===== -->

  <!-- 
    COMPONENT INTERACTION: Parent → Child (@Input)
    - The parent (HomeComponent) passes each product object down via [product]="product".
    - ProductCardComponent receives it with @Input() product.
    - See: product-card.component.ts
  -->
  <div class="mb-5 p-3 border rounded bg-light">
    <h3>Products List</h3>
    <div class="row g-4">
      @for (product of productsList; track product.id) {
        <div class="col-md-4 col-lg-3">
          <app-product-card [product]="product"></app-product-card>
        </div>
      } @empty {
        <p class="text-center text-muted fs-5">No Products Available</p>
      }
    </div>
  </div>

  <div class="mb-5 p-3 border rounded bg-light">
    <h3 #deferTrigger>Recommended Products</h3>

    <!-- 
      @defer (Deferrable Views)
      - Lazy-loads components at runtime to improve initial page performance.
      - The component's JS bundle is NOT downloaded until the trigger fires.
      - Triggers: on idle | immediate | viewport | hover | interaction | timer | when <condition>
      - Blocks: @placeholder (shown before trigger), @loading (shown while loading), @error
      - 'prefetch': Pre-downloads the JS bundle early (e.g. prefetch on idle) without rendering yet.
    -->

    <!-- EXAMPLE 1 (commented): Trigger on a specific element reference (#deferTrigger) -->
    <!-- @defer (on interaction(deferTrigger)) {
      <app-recommended-products />
    } -->

    <!-- EXAMPLE 2 (commented): Trigger on hover over the placeholder itself -->
    <!-- @defer (on hover) {
      <app-recommended-products />
    } @placeholder {
      <div class="p-3 border text-center">Hover here to load recommended products</div>
    } -->

    <!-- ACTIVE EXAMPLE: Trigger on click (interaction), prefetch JS bundle on idle -->
    @defer (on interaction; prefetch on idle) {
      <app-recommended-products></app-recommended-products>
    } @placeholder {
      <button class="btn btn-primary d-block mx-auto">
        Show Recommended Products
      </button>
    }
  </div>
