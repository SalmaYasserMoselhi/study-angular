<section class="p-4 border rounded bg-light">
  <h2>About us</h2>
  <p>
    This is the parent component. Use the links below to load child components
    inside the outlet.
  </p>

  <!-- 
    NESTED ROUTING — Parent View
    - Child links use RELATIVE paths (no leading '/') so Angular resolves them
      relative to the current route (/about/team, /about/company).
    - Using an absolute path like routerLink="/team" would navigate to /team (wrong).
    - <router-outlet> is the slot where the matched child component renders.
  -->
  <nav class="mb-3">
    <a routerLink="company" routerLinkActive="fw-bold text-primary" class="me-3"
      >Company</a
    >
    <a routerLink="team" routerLinkActive="fw-bold text-primary">Team</a>
  </nav>

  <hr />

  <div class="p-3 bg-white border">
    <router-outlet></router-outlet>
  </div>

  <!-- 
    CONTENT PROJECTION (ng-content) + @Output demo
    - Content between <alert>...</alert> tags is projected into the component's <ng-content>.
    - See alert.component.html for the slot definitions.
  -->
  <alert>
    <span>About Component</span>
  </alert>
</section>
