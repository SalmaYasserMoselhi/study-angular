<nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-sm fixed-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" routerLink="/">
      <img
        src="favicon.ico"
        alt="Logo"
        width="30"
        height="30"
        class="d-inline-block align-text-top me-2"
      />
      <span class="fw-bold">StudyAngular</span>
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <!-- 
        ROUTING: routerLink vs href
        - routerLink: SPA navigation — changes the URL without a full page reload.
        - href: Causes a full page reload; only use for external links.

        routerLinkActive: Applies the given CSS class(es) when this link's route is active.

        routerLinkActiveOptions { exact: true }:
        - By default, /about also matches /about/team (partial match).
        - exact: true makes the active class apply ONLY when the URL matches exactly.
        - Important for parent routes that should not stay "active" when on a child route.
      -->
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/home"
            routerLinkActive="text-primary fw-bold"
            >Home</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/about"
            routerLinkActive="text-primary fw-bold"
            [routerLinkActiveOptions]="{ exact: true }"
            >About</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/gallery"
            routerLinkActive="text-primary fw-bold"
            >Gallery</a
          >
        </li>
      </ul>
    </div>
  </div>
</nav>
